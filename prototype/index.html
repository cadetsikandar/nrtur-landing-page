<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nrtur — Full Prototype</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 950:'#07070f',925:'#09091a',900:'#0b0b18',850:'#0d0d1a' },
          },
          fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: {
            'brand':'0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg':'0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
          },
          keyframes: {
            fadeUp:    {'0%':{opacity:0,transform:'translateY(8px)'},'100%':{opacity:1,transform:'translateY(0)'}},
            glowPulse: {'0%,100%':{opacity:0.5},'50%':{opacity:1}},
          },
          animation: {
            'fade-up':'fadeUp 400ms ease-out both',
            'glow-pulse':'glowPulse 3s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
    html,body,#root{height:100%}
    body{margin:0;background:#07070f;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    ::selection{background:rgba(99,102,241,0.35)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes glowPulse{0%,100%{opacity:.5}50%{opacity:1}}
    .scroll-area::-webkit-scrollbar{width:6px;height:8px}
    .scroll-area::-webkit-scrollbar-track{background:transparent}
    .scroll-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:9999px}
    .scroll-area::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.45)}
    .deal-card{transition:all 200ms ease}
    .deal-card:hover{transform:translateY(-1px)}
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
